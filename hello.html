<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello World Airport Clock</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #252a2f 0%, #16191d 45%, #101214 100%);
      color: #f6d36a;
      font-family: "Courier New", Courier, monospace;
      letter-spacing: 0.05em;
    }

    .board {
      width: min(90vw, 620px);
      padding: 1.5rem;
      border: 3px solid #2f353b;
      border-radius: 0.8rem;
      background: #1a1d20;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45), inset 0 0 0 1px #3a4046;
    }

    .header {
      margin: 0 0 1rem;
      text-align: center;
      font-size: 1.2rem;
      color: #f9e39e;
    }

    .flap-text {
      display: grid;
      grid-template-columns: repeat(13, 1fr);
      gap: 0.25rem;
      margin-bottom: 1.3rem;
    }

    .cell {
      text-align: center;
      padding: 0.4rem 0;
      background: linear-gradient(#17191c 0%, #121417 50%, #17191c 100%);
      border: 1px solid #343a41;
      border-radius: 0.2rem;
      color: #f8da7d;
      font-size: clamp(0.75rem, 2.2vw, 1rem);
      text-shadow: 0 0 6px rgba(248, 218, 125, 0.32);
    }

    .clock-wrap {
      display: grid;
      place-items: center;
      padding: 1rem 0 0.6rem;
    }

    .clock {
      position: relative;
      width: min(68vw, 290px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, #13161a 0%, #0f1114 65%, #0b0d0f 100%);
      border: 7px solid #7f6941;
      box-shadow:
        inset 0 0 18px rgba(0, 0, 0, 0.75),
        0 10px 22px rgba(0, 0, 0, 0.45);
    }

    .tick {
      position: absolute;
      top: 5%;
      left: 50%;
      width: 0.18rem;
      height: 8%;
      transform-origin: 50% 570%;
      background: #d1b15a;
      border-radius: 99px;
      opacity: 0.9;
    }

    .tick.hour {
      height: 11%;
      width: 0.25rem;
      background: #efcd73;
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: 50% 100%;
      border-radius: 99px;
      transform: translateX(-50%) rotate(0deg);
    }

    .hour-hand {
      width: 0.42rem;
      height: 25%;
      background: #f0d37f;
    }

    .minute-hand {
      width: 0.3rem;
      height: 35%;
      background: #f3dc98;
    }

    .second-hand {
      width: 0.14rem;
      height: 40%;
      background: #d7763f;
    }

    .hub {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0.9rem;
      height: 0.9rem;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #e8cb81;
      box-shadow: 0 0 8px rgba(232, 203, 129, 0.5);
    }

    .footer {
      text-align: center;
      margin-top: 0.7rem;
      font-size: 0.88rem;
      color: #cab374;
    }
  </style>
</head>
<body>
  <main class="board">
    <h1 class="header">DEPARTURES BOARD</h1>
    <section class="flap-text" aria-label="Hello world text">
      <span class="cell">H</span>
      <span class="cell">E</span>
      <span class="cell">L</span>
      <span class="cell">L</span>
      <span class="cell">O</span>
      <span class="cell">,</span>
      <span class="cell">&nbsp;</span>
      <span class="cell">W</span>
      <span class="cell">O</span>
      <span class="cell">R</span>
      <span class="cell">L</span>
      <span class="cell">D</span>
      <span class="cell">!</span>
    </section>
    <section class="clock-wrap" aria-label="Analog clock">
      <div class="clock" id="clock">
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand minute-hand" id="minuteHand"></div>
        <div class="hand second-hand" id="secondHand"></div>
        <div class="hub"></div>
      </div>
    </section>
    <p class="footer">LOCAL TIME</p>
  </main>

  <script>
    const clock = document.getElementById("clock");
    for (let i = 0; i < 60; i += 1) {
      const tick = document.createElement("div");
      tick.className = i % 5 === 0 ? "tick hour" : "tick";
      tick.style.transform = `translateX(-50%) rotate(${i * 6}deg)`;
      clock.appendChild(tick);
    }

    const hourHand = document.getElementById("hourHand");
    const minuteHand = document.getElementById("minuteHand");
    const secondHand = document.getElementById("secondHand");

    function updateClock() {
      const now = new Date();
      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours() % 12;

      const secondAngle = seconds * 6;
      const minuteAngle = minutes * 6 + seconds * 0.1;
      const hourAngle = hours * 30 + minutes * 0.5;

      hourHand.style.transform = `translateX(-50%) rotate(${hourAngle}deg)`;
      minuteHand.style.transform = `translateX(-50%) rotate(${minuteAngle}deg)`;
      secondHand.style.transform = `translateX(-50%) rotate(${secondAngle}deg)`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
